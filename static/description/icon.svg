<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="30" fill="#1a73e8"/>
  <!-- Réseau : noeuds -->
  <circle cx="100" cy="40" r="18" fill="white" opacity="0.95"/>
  <circle cx="40" cy="130" r="15" fill="white" opacity="0.85"/>
  <circle cx="160" cy="130" r="15" fill="white" opacity="0.85"/>
  <circle cx="100" cy="165" r="15" fill="#4fc3f7" opacity="0.95"/>
  <!-- Liens réseau -->
  <line x1="100" y1="58" x2="46" y2="117" stroke="white" stroke-width="3" opacity="0.7"/>
  <line x1="100" y1="58" x2="154" y2="117" stroke="white" stroke-width="3" opacity="0.7"/>
  <line x1="50" y1="140" x2="100" y2="153" stroke="white" stroke-width="3" opacity="0.7"/>
  <line x1="150" y1="140" x2="100" y2="153" stroke="white" stroke-width="3" opacity="0.7"/>
  <line x1="55" y1="130" x2="145" y2="130" stroke="white" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <!-- Bouclier sécurité -->
  <text x="100" y="46" text-anchor="middle" font-size="16" fill="#1a73e8" font-weight="bold">N</text>
  <!-- Check qualité -->
  <text x="100" y="173" text-anchor="middle" font-size="12" fill="#1a73e8" font-weight="bold">✓</text>
</svg>
